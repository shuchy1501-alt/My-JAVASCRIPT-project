<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>

<form id="f" name="f" style="width: 400px; margin:0 auto;">

    <div>
        <label>Name</label>
        <input type="text" id="name" name="name"><br><br>
    </div>

    <div>
        <label>Phone</label>
        <input type="number" id="phone" name="phone" placeholder="Enter your Number"><br><br>
    </div>

    <div>
        <label>Address</label>
        <textarea id="address" name="address" placeholder="Enter your Address"></textarea><br><br>
    </div>

    <div>
        <label>City</label>
        <input type="text" id="city" name="city" placeholder="Enter your City"><br><br>
    </div>

    <label>Gender:</label>

    <label for="male">Male</label>
    <input id="male" value="Male" name="gender" type="radio">

    <label for="female">Female</label>
    <input id="female" value="Female" name="gender" type="radio">

    <br><br>

    <div>
        <input type="submit" value="Submit"/>
    </div>

</form>

<script>

let form = document.getElementById("f");

form.onsubmit = function(e){

    e.preventDefault();

    let name = form.name.value;
    let phone = form.phone.value;
    let address = form.address.value;
    let city = form.city.value;

    let genders = document.getElementsByName("gender");

    let selectedGender = "";

    for(let gender of genders){
        if(gender.checked){
            selectedGender = gender.value;
        }
    }

    let w = window.open("", "_blank", "width=400,height=400");

    w.document.write(`<h3>Name: ${name}</h3>`);
    w.document.write(`<p>Phone: ${phone}</p>`);
    w.document.write(`<p>Address: ${address}</p>`);
    w.document.write(`<p>City: ${city}</p>`);
    w.document.write(`<p>Gender: ${selectedGender}</p>`);

    w.document.write(`<button onclick="self.close()">Close</button>`);
    w.document.write(`<button onclick="print()">Print</button>`);
}

</script>

</body>
</html>
