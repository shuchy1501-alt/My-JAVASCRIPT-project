<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>counter</title>
</head>
<body>
    <div id="container">
      <h1 id="counter_value">0</h1>
    <button id="increment_id">Increases</button>
    <button class="btn" id="reset_id">Reset</button>
    <button class="btn" id="decrement_id">Decreases</button>  
   </div>
    </div>
   <script>
    let counter = 0;
    let counter_value = document.getElementById("counter_value");
    let increment = document.getElementById("increment_id");
    let reset = document.getElementById("reset_id");
    let decrement = document.getElementById("decrement_id");
    
    increment.onclick=function(){
        counter++;
        counter_value.innerText = counter;
        console.log(counter);
        
    }
    decrement.onclick = function(){
        counter--;
        counter_value.innerText=counter;
    }
    reset.onclick = function(){
        counter = 0;
        counter_value.innerText=counter;
    }
   </script>
</body>
</html>
