<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" id="f" name="f" style="width: 400px; margin: 0 auto;">
        <div>
            <label for="name">Name</label><br>
            <input type="text" id="name" name="name" onblur="nameValidation()"/>
            <span id="namemessage"></span>
        </div>
        <div>
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password" onblur="passValidation()"/>
            <span style="cursor: pointer;" onclick="showPassword()">&#x1F441;</span> 
            <span id="passwordMessage"></span>
        </div>
         <div>
            <label for="email">Email</label><br>
            <input type="text" id="email" name="email" onblur="emailValidation()"/>
            <span id="emailmessage"></span>
        </div>
         <div>
            <label for="city">City</label><br>
            <select name="city" id="city">
                <option value="Dhaka">Dhaka</option>
                <option value="Khulna">Khulna</option>
                <option value="Rajshahi">Rajshahi</option>
                <option value="Barishal">Barishal</option>
            </select>
        </div>
        <div class="checkbox">
            <label for="gender">Gender:</label>
            <label for="Male">Male
                <input type="radio" id="Male" name="gender" value="Male" checked/>
            </label>
         <!-- <div class="checkbox"> -->
            <label for="Female">Female
                <input type="radio" id="Female" name="gender" value="Female" />
            </label><br>
        </div>
        <div class="checkbox">
            <label for="Bangla">Bangla
                <input type="checkbox" id="Bangla" name="subject" value="Bangla" />
            </label>
            <!-- <div class="checkbox"> -->
            <label for="English">English
                <input type="checkbox" id="English" name="subject" value="English" />
            </label>
            <!-- <div class="checkbox"> -->
            <label for="ICT">ICT
                <input type="checkbox" id="ICT" name="subject" value="ICT" />
            </label><br>
        <div>
            <label for="comment">Comment</label>
            <textarea id="comment" name="comment"></textarea><br>
        </div>
        <div>
            <input type="submit" />
        </div>
    </form>
    <script>
        function nameValidation(){
    let name = document.getElementById("name");
    let nameMessage = document.getElementById("namemessage");

    let pattern = /^[a-zA-Z ]{4,}$/;

    if(pattern.test(name.value)){
        nameMessage.innerText = "Valid Name";
        nameMessage.style.color = "green";
    }else{
        nameMessage.innerText = "Invalid Name";
        nameMessage.style.color = "red";
    }
}
function passValidation(){
    let password = document.getElementById("password");
    

    let pattern = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[a-z])(?=.*[@#$%^&*!]).{8,}$/;

    if(pattern.test(password.value)){
        passwordMessage.innerText = "Valid password";
        passwordMessage.style.color = "green";
    }else{
        passwordMessage.innerText = "Invalid password";
        passwordMessage.style.color = "red";
    }
}
function showPassword(){
    let password = document.getElementById("password");
    if(password.type === "password"){
        password.type = "text";
    }else {
        password.type = "text";
    }
}
        function emailValidation(){
    let email = document.getElementById("email");
    let emailMessage = document.getElementById("emailmessage");

    let pattern = /^[a-z0-9_]{3,}@[a-z]{3,}\.[a-z]{2,}$/;

    if(pattern.test(email.value)){
        emailMessage.innerText = "Valid Email";
        emailMessage.style.color = "green";
    }else{
        emailMessage.innerText = "Invalid Email";
        emailMessage.style.color = "red";
    }
}
let form = document.getElementById("f");
console.log(form);
form.onsubmit = function (e){
    e.preventDefault()
    let name = form.name.value;
    let email = form.email.value;
    let city = form.city.value;
    let comment = form.comment.value;

    let gender = form.gender
    let subjects = form.subject

    let selectedGender ="";
    let selectedSubject ="";
    for (s of subjects) {
          if(s.checked) {
            selectedSubject +=s.value + ",";
          }
    }
    for (g of gender) {
          if(s.checked) {
            selectedGender = g.value;
          }
    }
    let w = window.open("","_blank","width=400,height=400");
    w.document.write(`
    <div>
        <h3>Name: ${name}</h3>
        <p>Email: ${email}</p>
        <p>city: ${city}</p>
        <p>Gender: ${selectedGender}</p>
        <p>Subject: ${selectedSubject}</p>
        <p>comment: ${comment}</p>
      </div>
      <button onclick="self.close()">close</button>
      <button onclick="print()">print</button>
      </div>
    `)

}
    </script>
</body>
</html>
