<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
    let num1=Number(prompt("Enter 1st Number"));
    let num2=Number(prompt("Enter 2nd Number"));
    let num3=Number(prompt("Enter 3rd Number"));

    if(num1 > num2){
     if(num1> num3){
      document.write(`<h1>${num1} is the max number among ${num1},${num2},${num3}</h1>`);
     }else{
        document.write(`<h1>${num3} is the max number among ${num1},${num2},${num3}</h1>`);
     }
    }else if(num2 > num1){
      if(num2 > num3){
        document.write(`<h1>${num2} is the max number among ${num1},${num2},${num3}</h1>`);
      }else{
        document.write(`<h1>${num3} is the max number among ${num1},${num2},${num3}</h1>`);
      }
    }
</script>

</body>
</html>
