<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let fnum = Number(prompt("Enter your number"));
        let result=1;
        for(let i=1;i<=fnum;i++){
          result *= i;
        }
        document.write("factorial= " + result);
    </script>
</body>
</html>
